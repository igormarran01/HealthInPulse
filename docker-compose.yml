version: '3.9'

services:
  # ─── Banco de dados ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: healthinpulse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: senha
      POSTGRES_DB:       healthinpulse
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Interface visual do banco (dev) ─────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: healthinpulse-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@healthinpulse.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - '5050:80'
    depends_on:
      - postgres

  # ─── Backend (opcional — rode local em dev) ───────────────────
  # backend:
  #   build: ./backend
  #   container_name: healthinpulse-api
  #   restart: unless-stopped
  #   env_file: ./backend/.env
  #   ports:
  #     - '3000:3000'
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

volumes:
  postgres_data:
